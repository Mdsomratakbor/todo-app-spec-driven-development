<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Register</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" required />
        <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
          Username is required
        </mat-error>
        <mat-error *ngIf="registerForm.get('username')?.hasError('usernameTaken')">
          {{ registerForm.get('username')?.getError('usernameTaken') }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" required />
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword" required />
        <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('required')">
          Confirm password is required
        </mat-error>
        <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch')">
          Passwords do not match
        </mat-error>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <div *ngIf="fieldErrors && fieldErrors.length > 0" class="error-message">
        <div *ngFor="let err of fieldErrors">{{ err }}</div>
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid || loading" class="full-width">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </form>
  </mat-card-content>
  <mat-card-actions>
    <span>Already have an account?</span>
    <a mat-button routerLink="/login">Login</a>
  </mat-card-actions>
</mat-card>
